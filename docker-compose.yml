version: '3.9'

services:

  app:
    build: .
    container_name: yuvraj_app
    restart: always
    ports:
      - "8000:5000"
    
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Root@123
      DB_NAME: medical_store

    depends_on:
        mysql:
          condition: service_started  

    networks:
      - medical-network

  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: medical_store

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - medical-network
    healthcheck:
     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
     timeout: 20s
     retries: 10    

  nginx:
    image: nginx:latest
    container_name: nginx_container
    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - medical-network
networks:
  medical-network:

volumes:
  mysql-data:

