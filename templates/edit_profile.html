<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <style>
        body { font-family: Arial; background:#f4f4f4; }
        .card {
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }
        input {
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:6px;
        }
        button {
            width:100%;
            padding:10px;
            background:#2c7be5;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Edit Profile</h2>

    <form method="POST">

        <input type="text" name="name" value="{{ user['name'] }}" required>

        <input type="text" name="phone" value="{{ user['phone'] }}" required>

        <input type="text" name="address" value="{{ user['address'] }}" required>

        <button type="submit">Save Changes</button>

    </form>
</div>

</body>
</html>
