<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        .header {
            background: #2c7be5;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btns a {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            color: white;
            margin-left: 10px;
            font-size: 14px;
        }

        .home {
            background: green;
        }

        .cart {
            background: orange;
        }

        .container {
            padding: 20px;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>🧾 Checkout</h2>

    <!-- NAV BUTTONS -->
    <div class="nav-btns">
        <a href="/" class="home">🏠 Home</a>
        <a href="/cart" class="cart">🛒 Cart</a>
    </div>
</div>

<div class="container">

    <div class="form-box">

		<form action="/place_order" method="POST" enctype="multipart/form-data">
			!-- 📂 PRESCRIPTION SECTION -->
<div style="margin-top:15px;">

    <label style="font-weight:bold;">
        📄 Upload Doctor Prescription
    </label>

    <p style="font-size:13px; color:gray; margin:5px 0;">
        Please upload a valid prescription from a certified doctor for better support.
    </p>

    <input type="file" name="prescription" accept="image/*,.pdf"
           style="padding:8px; border:1px solid #ccc; width:100%;">

</div>
            <input type="text" name="name" placeholder="Full Name" required>

            <input type="text" name="contact" placeholder="Contact Number" required>

            <textarea name="address" placeholder="Delivery Address" required></textarea>

            <select name="payment" required>
                <option value="">Select Payment Method</option>
                <option value="GPay">GPay</option>
                <option value="COD">Cash on Delivery</option>
            </select>

            <button type="submit">Place Order</button>

        </form>

    </div>

</div>

</body>
</html>
